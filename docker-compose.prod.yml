services:
  redis:
    image: redis:7.4-alpine
    container_name: knowledge-doc-redis-prod
    restart: always
    volumes:
      - ./volumes-prod/redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - knowledge-doc-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: knowledge-doc-postgres-prod
    restart: always
    volumes:
      - ./volumes-prod/postgres-data:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-knowledge_doc}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-knowledge_doc}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - knowledge-doc-network

  mem0-postgres:
    image: pgvector/pgvector:pg17
    container_name: knowledge-doc-mem0-postgres-prod
    restart: always
    volumes:
      - ./volumes-prod/mem0-postgres-data:/var/lib/postgresql/data
      - ./docker/mem0/init-db.sh:/docker-entrypoint-initdb.d/01-init-mem0-app.sh:ro
    environment:
      - POSTGRES_DB=mem0
      - POSTGRES_USER=${MEM0_POSTGRES_USER:-mem0}
      - POSTGRES_PASSWORD=${MEM0_POSTGRES_PASSWORD:?Set MEM0_POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEM0_POSTGRES_USER:-mem0} -d mem0"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - knowledge-doc-network

  mem0:
    image: knowledge-doc-mem0:42cf18c
    container_name: knowledge-doc-mem0-prod
    restart: always
    build:
      context: .
      dockerfile: docker/mem0/Dockerfile
    ports:
      - '8888:8000'
    volumes:
      - ./volumes-prod/mem0-history:/app/history
    environment:
      - POSTGRES_HOST=mem0-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mem0
      - POSTGRES_USER=${MEM0_POSTGRES_USER:-mem0}
      - POSTGRES_PASSWORD=${MEM0_POSTGRES_PASSWORD:?Set MEM0_POSTGRES_PASSWORD}
      - POSTGRES_COLLECTION_NAME=memories
      - APP_DB_NAME=mem0_app
      - OPENAI_API_KEY=${QWEN_API_KEY:?Set QWEN_API_KEY}
      - OPENAI_BASE_URL=${QWEN_API_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - MEM0_DEFAULT_LLM_MODEL=qwen-plus
      - MEM0_DEFAULT_EMBEDDER_MODEL=text-embedding-v2
      - ADMIN_API_KEY=${MEM0_API_KEY:?Set MEM0_API_KEY}
      - JWT_SECRET=${MEM0_JWT_SECRET:?Set MEM0_JWT_SECRET}
      - AUTH_DISABLED=false
      - DASHBOARD_URL=${MEM0_DASHBOARD_URL:-http://localhost:3006}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-false}
    depends_on:
      mem0-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - knowledge-doc-network

  mem0-dashboard:
    image: knowledge-doc-mem0-dashboard:42cf18c
    container_name: knowledge-doc-mem0-dashboard-prod
    restart: always
    build:
      context: .
      dockerfile: docker/mem0/Dockerfile.dashboard
    ports:
      - '3006:3000'
    environment:
      - NEXT_PUBLIC_API_URL=${MEM0_PUBLIC_API_URL:-http://localhost:8888}
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=Knowledge Quiz Mem0
    depends_on:
      mem0:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - knowledge-doc-network

  elasticsearch:
    build:
      context: .
      dockerfile: docker/elasticsearch/Dockerfile
    image: knowledge-doc-es:ik-8.15.3
    container_name: knowledge-doc-es-prod
    restart: always
    volumes:
      - ./volumes-prod/es-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    networks:
      - knowledge-doc-network

  neo4j:
    image: neo4j:5.26
    container_name: knowledge-doc-neo4j-prod
    restart: always
    volumes:
      - ./volumes-prod/neo4j-data:/data
      - ./volumes-prod/neo4j-logs:/logs
      - ./volumes-prod/neo4j-conf:/conf
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - knowledge-doc-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: knowledge-doc-clickhouse-prod
    restart: always
    volumes:
      - ./volumes-prod/clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-langfuse123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-langfuse}
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password=${CLICKHOUSE_PASSWORD:-langfuse123}", "--query=SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - knowledge-doc-network

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.77
    container_name: knowledge-doc-rustfs-prod
    hostname: rustfs
    restart: always
    volumes:
      - ./volumes-prod/rustfs-data:/data
      - ./volumes-prod/rustfs-logs:/logs
    environment:
      - RUSTFS_VOLUMES=/data
      - RUSTFS_ADDRESS=0.0.0.0:9000
      - RUSTFS_CONSOLE_ENABLE=true
      - RUSTFS_CONSOLE_ADDRESS=0.0.0.0:9001
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - knowledge-doc-network

  rustfs-init:
    image: public.ecr.aws/aws-cli/aws-cli:latest
    container_name: knowledge-doc-rustfs-init-prod
    depends_on:
      rustfs:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - AWS_SECRET_ACCESS_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - AWS_DEFAULT_REGION=${RUSTFS_REGION:-us-east-1}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-documents}
      - LANGFUSE_BUCKET=${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket "$${RUSTFS_BUCKET}" 2>/dev/null || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket "$${RUSTFS_BUCKET}"
        aws --endpoint-url http://rustfs:9000 s3api head-bucket --bucket "$${LANGFUSE_BUCKET}" 2>/dev/null || aws --endpoint-url http://rustfs:9000 s3api create-bucket --bucket "$${LANGFUSE_BUCKET}"
    networks:
      - knowledge-doc-network

  langfuse:
    image: langfuse/langfuse:latest
    container_name: knowledge-doc-langfuse-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_healthy
      rustfs-init:
        condition: service_completed_successfully
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres:5432/${LANGFUSE_DB:-langfuse}
      - REDIS_CONNECTION_STRING=redis://redis:6379/${LANGFUSE_REDIS_DB:-1}
      - CLICKHOUSE_URL=http://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-langfuse123}@clickhouse:8123/${CLICKHOUSE_DB:-langfuse}
      - CLICKHOUSE_MIGRATION_URL=clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-langfuse123}@clickhouse:9000/${CLICKHOUSE_DB:-langfuse}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-langfuse123}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-langfuse}
      - CLICKHOUSE_CLUSTER_ENABLED=${CLICKHOUSE_CLUSTER_ENABLED:-false}
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-false}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-langfuse-secret-key}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-langfuse-public-key}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-nextauth-secret}
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=${LANGFUSE_S3_EVENT_UPLOAD_BUCKET:-langfuse}
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=${LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT:-http://rustfs:9000}
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=${LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID:-rustfsadmin}
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=${LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY:-rustfsadmin}
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=${LANGFUSE_S3_EVENT_UPLOAD_REGION:-us-east-1}
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=${LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE:-true}
    networks:
      - knowledge-doc-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: knowledge-doc-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      neo4j:
        condition: service_started
      elasticsearch:
        condition: service_started
      rustfs:
        condition: service_healthy
      langfuse:
        condition: service_started
      mem0:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-knowledge_doc}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - ELASTICSEARCH_CHUNK_INDEX=${ELASTICSEARCH_CHUNK_INDEX:-document_chunks_v2}
      - RUSTFS_ENDPOINT=http://rustfs:9000
      - RUSTFS_ACCESS_KEY=${RUSTFS_ACCESS_KEY:-rustfsadmin}
      - RUSTFS_SECRET_KEY=${RUSTFS_SECRET_KEY:-rustfsadmin}
      - RUSTFS_BUCKET=${RUSTFS_BUCKET:-documents}
      - RUSTFS_REGION=${RUSTFS_REGION:-us-east-1}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-langfuse-secret-key}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-langfuse-public-key}
      - LANGFUSE_HOST=http://langfuse:3000
      - MEM0_BASE_URL=http://mem0:8000
      - MEM0_API_KEY=${MEM0_API_KEY:?Set MEM0_API_KEY}
      - MEM0_TIMEOUT_MS=${MEM0_TIMEOUT_MS:-30000}
      - MEM0_USER_MEMORY_TOP_K=${MEM0_USER_MEMORY_TOP_K:-10}
      - MEM0_CONVERSATION_MEMORY_TOP_K=${MEM0_CONVERSATION_MEMORY_TOP_K:-10}
      - MEM0_MEMORY_SCOPE_TOKEN_BUDGET=${MEM0_MEMORY_SCOPE_TOKEN_BUDGET:-2000}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_API_BASE_URL=${QWEN_API_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_VISION_MODEL=${QWEN_VISION_MODEL:-qwen-vl-plus}
      - QWEN_RERANK_MODEL=${QWEN_RERANK_MODEL:-gte-rerank-v2}
      - AI_CONTEXT_WINDOW_TOKENS=${AI_CONTEXT_WINDOW_TOKENS:-131072}
      - AI_CONTEXT_SUMMARY_TRIGGER_RATIO=${AI_CONTEXT_SUMMARY_TRIGGER_RATIO:-0.70}
      - AI_CONTEXT_TARGET_RATIO=${AI_CONTEXT_TARGET_RATIO:-0.50}
      - AI_MAX_OUTPUT_TOKENS=${AI_MAX_OUTPUT_TOKENS:-4096}
      - AI_SUMMARY_MAX_TOKENS=${AI_SUMMARY_MAX_TOKENS:-2048}
      - AI_RECENT_MESSAGES_MIN=${AI_RECENT_MESSAGES_MIN:-8}
      - RAG_PARSER_VERSION=${RAG_PARSER_VERSION:-2}
      - GRAPH_WORKER_POLL_MS=${GRAPH_WORKER_POLL_MS:-1000}
      - GRAPH_WORKER_CONCURRENCY=${GRAPH_WORKER_CONCURRENCY:-2}
      - GRAPH_WORKER_LEASE_MS=${GRAPH_WORKER_LEASE_MS:-300000}
      - GRAPH_WORKER_HEARTBEAT_MS=${GRAPH_WORKER_HEARTBEAT_MS:-30000}
      - GRAPH_WORKER_MAX_ATTEMPTS=${GRAPH_WORKER_MAX_ATTEMPTS:-3}
      - INGESTION_WORKER_AUTOSTART=false
      - GRAPH_CHECKPOINT_RETENTION_DAYS=${GRAPH_CHECKPOINT_RETENTION_DAYS:-7}
      - GRAPH_NODE_TIMEOUT_MS=${GRAPH_NODE_TIMEOUT_MS:-120000}
      - RAG_AGENTIC_ENABLED=${RAG_AGENTIC_ENABLED:-false}
      - RAG_AGENTIC_MAX_REWRITES=${RAG_AGENTIC_MAX_REWRITES:-1}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1536}
      - NOVEL_GRAPH_VERSION=${NOVEL_GRAPH_VERSION:-1}
      - NOVEL_GRAPH_MIN_CONFIDENCE=${NOVEL_GRAPH_MIN_CONFIDENCE:-0.7}
      - NOVEL_GRAPH_WINDOW_TOKENS=${NOVEL_GRAPH_WINDOW_TOKENS:-6000}
      - NOVEL_GRAPH_STAGE_TIMEOUT_MS=${NOVEL_GRAPH_STAGE_TIMEOUT_MS:-180000}
      - NOVEL_GRAPH_RETRIEVAL_TOP_K=${NOVEL_GRAPH_RETRIEVAL_TOP_K:-20}
      - RAG_GRAPH_CONTEXT_TOKEN_BUDGET=${RAG_GRAPH_CONTEXT_TOKEN_BUDGET:-2000}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID:-}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY:-}
      - TENCENT_REGION=${TENCENT_REGION:-ap-beijing}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/documents"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - knowledge-doc-network

  ingestion-worker:
    extends:
      service: backend
    container_name: knowledge-doc-ingestion-worker-prod
    command: ["pnpm", "--filter", "backend", "start:ingestion-worker:prod"]
    environment:
      - TYPEORM_MIGRATIONS_RUN=false
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      disable: true

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: knowledge-doc-frontend-prod
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - knowledge-doc-network

networks:
  knowledge-doc-network:
    driver: bridge
