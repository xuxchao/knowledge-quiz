services:
  redis:
    image: redis:7.4-alpine
    container_name: knowledge-doc-redis-prod
    restart: always
    volumes:
      - ./volumes-prod/redis-data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    networks:
      - knowledge-doc-network

  postgres:
    image: postgres:16-alpine
    container_name: knowledge-doc-postgres-prod
    restart: always
    volumes:
      - ./volumes-prod/postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-knowledge_doc}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
    networks:
      - knowledge-doc-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: knowledge-doc-es-prod
    restart: always
    volumes:
      - ./volumes-prod/es-data:/usr/share/elasticsearch/data
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false
    networks:
      - knowledge-doc-network

  neo4j:
    image: neo4j:5.26
    container_name: knowledge-doc-neo4j-prod
    restart: always
    volumes:
      - ./volumes-prod/neo4j-data:/data
      - ./volumes-prod/neo4j-logs:/logs
      - ./volumes-prod/neo4j-conf:/conf
    environment:
      - NEO4J_AUTH=${NEO4J_AUTH:-neo4j/password}
      - NEO4J_PLUGINS=["apoc"]
    networks:
      - knowledge-doc-network

  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: knowledge-doc-clickhouse-prod
    restart: always
    volumes:
      - ./volumes-prod/clickhouse-data:/var/lib/clickhouse
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-default}
    networks:
      - knowledge-doc-network

  langfuse:
    image: langfuse/langfuse:latest
    container_name: knowledge-doc-langfuse-prod
    restart: always
    depends_on:
      - postgres
      - redis
      - clickhouse
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-knowledge_doc}
      - REDIS_URL=redis://redis:6379
      - CLICKHOUSE_URL=http://clickhouse:8123/${CLICKHOUSE_DB:-default}
      - CLICKHOUSE_MIGRATION_URL=clickhouse://${CLICKHOUSE_USER:-default}:${CLICKHOUSE_PASSWORD:-}@clickhouse:9000/${CLICKHOUSE_DB:-default}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-default}
      - CLICKHOUSE_CLUSTER_ENABLED=${CLICKHOUSE_CLUSTER_ENABLED:-false}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-langfuse-secret-key}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-langfuse-public-key}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-nextauth-secret}
    networks:
      - knowledge-doc-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: knowledge-doc-backend-prod
    restart: always
    depends_on:
      - postgres
      - redis
      - neo4j
      - elasticsearch
      - langfuse
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-knowledge_doc}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - ELASTICSEARCH_HOST=http://elasticsearch:9200
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-langfuse-secret-key}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-langfuse-public-key}
      - LANGFUSE_HOST=http://langfuse:3000
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_API_BASE_URL=${QWEN_API_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - TENCENT_SECRET_ID=${TENCENT_SECRET_ID:-}
      - TENCENT_SECRET_KEY=${TENCENT_SECRET_KEY:-}
      - TENCENT_REGION=${TENCENT_REGION:-ap-beijing}
    networks:
      - knowledge-doc-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: knowledge-doc-frontend-prod
    restart: always
    ports:
      - '80:80'
    depends_on:
      - backend
    networks:
      - knowledge-doc-network

networks:
  knowledge-doc-network:
    driver: bridge
